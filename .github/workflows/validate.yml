name: Validate Plugin Repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: JSON + Python Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate marketplace.json
        run: python3 -m json.tool .claude-plugin/marketplace.json > /dev/null

      - name: Validate plugin.json
        run: python3 -m json.tool plugins/mercadopago/.claude-plugin/plugin.json > /dev/null

      - name: Validate .mcp.json
        run: python3 -m json.tool plugins/mercadopago/.mcp.json > /dev/null

      - name: Validate hooks.json
        run: python3 -m json.tool plugins/mercadopago/hooks/hooks.json > /dev/null

      - name: Validate settings.json
        run: python3 -m json.tool .claude/settings.json > /dev/null


      - name: Python hook syntax check
        run: python3 -m py_compile plugins/mercadopago/hooks/validate_mp_credentials.py

      - name: Test hook blocks real token
        run: |
          RESULT=$(echo '{"tool_name":"Write","tool_input":{"file_path":"app.js","content":"const token = \"TEST-123456789012-123456-abc12345678901234567890123456789-U123456\""}}' \
            | python3 plugins/mercadopago/hooks/validate_mp_credentials.py; echo $?)
          if [ "$RESULT" != "2" ]; then
            echo "ERROR: Hook should have blocked real token (expected exit 2, got $RESULT)"
            exit 1
          fi
          echo "PASS: Hook correctly blocked real token"

      - name: Test hook allows env var reference
        run: |
          EXIT_CODE=$(echo '{"tool_name":"Write","tool_input":{"file_path":"app.js","content":"const token = process.env.MP_ACCESS_TOKEN"}}' \
            | python3 plugins/mercadopago/hooks/validate_mp_credentials.py; echo $?)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "ERROR: Hook should have allowed env var reference (expected exit 0, got $EXIT_CODE)"
            exit 1
          fi
          echo "PASS: Hook correctly allowed env var reference"

      - name: Verify required files exist
        run: |
          # Fixed infrastructure files — must always exist regardless of skill architecture
          required_files=(
            ".claude-plugin/marketplace.json"
            "plugins/mercadopago/.claude-plugin/plugin.json"
            "plugins/mercadopago/.mcp.json"
            "plugins/mercadopago/hooks/hooks.json"
            "plugins/mercadopago/hooks/validate_mp_credentials.py"
            ".claude/settings.json"
            "plugins/mercadopago/agents/mp-integration-expert.md"
            "plugins/mercadopago/commands/mp-review.md"
            "plugins/mercadopago/PLUGIN_SETTINGS.md"
            "plugins/mercadopago/README.md"
            "README.md"
            "CONTRIBUTING.md"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

          # Structural checks — architecture-agnostic, work for v3 (multi-product skills)
          # and v4 (consolidated orchestration skills) alike.

          # 1) At least one user-facing command beyond /mp-review must exist
          #    (v3: /mp-setup; v4: /mp-integrate). /mp-connect is optional.
          shopt -s nullglob
          extra_commands=(plugins/mercadopago/commands/mp-{setup,integrate}.md)
          if [ ${#extra_commands[@]} -eq 0 ]; then
            echo "MISSING: at least one of mp-setup.md or mp-integrate.md must exist under plugins/mercadopago/commands/"
            exit 1
          fi
          for f in "${extra_commands[@]}"; do echo "OK: $f"; done

          # 2) At least one SKILL.md must exist under plugins/mercadopago/skills/
          skill_count=$(find plugins/mercadopago/skills -name SKILL.md -type f | wc -l)
          if [ "$skill_count" -lt 1 ]; then
            echo "MISSING: no SKILL.md found under plugins/mercadopago/skills/"
            exit 1
          fi
          echo "OK: found $skill_count SKILL.md file(s)"
