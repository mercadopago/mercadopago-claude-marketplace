name: Generate Catalog

on:
  push:
    branches: [main, feature/views]
    paths:
      - 'plugins/mp-developer/skills/*/SKILL.md'
      - 'plugins/mp-developer/agents/*.md'
      - 'plugins/mp-developer/commands/*.md'
      - 'plugins/mp-developer/hooks/**'
      - 'plugins/mp-developer/.claude-plugin/plugin.json'
      - 'scripts/generate_catalog.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate components.json
        run: python3 scripts/generate_catalog.py

      - name: Validate JSON
        run: python3 -m json.tool docs/components.json > /dev/null

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/components.json
          git diff --cached --quiet || git commit -m "chore: auto-regenerate components.json"
          git push
